

<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Builder - Dynamic Construction Grid Guide</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #a3d5ff;
            user-select: none;
        }
        .floating-ui {
            position: absolute;
            display: flex;
            gap: 10px;
            z-index: 5;
            pointer-events: auto;
            transform: translate(-50%, -50%);
        }
        .btn-ui {
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        .btn-ui:hover { transform: scale(1.1); }
        .btn-check { background-color: #00ffaa; color: #111; }
        .btn-cancel { background-color: #ff4444; color: white; }
    </style>
</head>
<body>

    <div id="build-menu" style="position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 8px; font-family: Arial, sans-serif; color: white; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.5); width: 220px;">
        <h3 style="margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 8px; color: #00ffaa;">Road Constructor v12</h3>
        
        <button onclick="simulanAngPagdaan()" style="width: 100%; padding: 12px; background: #222; color: #00ffaa; border: 2px solid #00ffaa; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s;">
            🛣️ Maglatag ng Daan
        </button>

        <div id="progress-container" style="width: 100%; height: 8px; background: #333; margin-top: 15px; border-radius: 4px; overflow: hidden; display: none;">
            <div id="progress-bar" style="width: 0%; height: 100%; background: #00ffaa; transition: width 0.1s ease;"></div>
        </div>
        
        <p id="status-text" style="font-size: 13px; color: #bbb; margin-top: 15px; margin-bottom: 0; font-style: italic;">Status: Idle</p>
    </div>

    <div id="ui-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

    <script>
        // --- A. INITIALIZATION ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa3d5ff);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 16, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 2.0);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        const lupaGeo = new THREE.PlaneGeometry(120, 120);
        const lupaMat = new THREE.MeshStandardMaterial({ color: 0x557a2b });
        const lupa = new THREE.Mesh(lupaGeo, lupaMat);
        lupa.rotation.x = -Math.PI / 2;
        scene.add(lupa);

        // BAGO: Lumikha ng Grid Helper na 3-units ang bawat square para tumugma sa laki ng kalsada natin (3x3)
        const gridGuide = new THREE.GridHelper(120, 40, 0x00ffaa, 0xffffff);
        gridGuide.position.y = 0.01; // Bahagyang itaas sa lupa para walang z-fighting
        gridGuide.visible = false; // Nakatago sa simula
        scene.add(gridGuide);

        const clock = new THREE.Clock();

        // --- B. VARIABLES ---
        let kasalukuyangNagdadalan = false;
        let isDragging = false;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const nakalatagNaMgaDaan = new Set();    
        const nakaplanoPaLang = new Set();       
        const lahatNgKalsadaMesh = {};           
        
        const activeConstructions = [];
        let kasalukuyangBatchId = 0;
        const pendingBatches = {};

        // --- C. TEXTURE GENERATOR ---
        function gupitinAngKalsadaTexture(mayN, mayS, mayE, mayW) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, 0, 128, 128);
            ctx.lineWidth = 4; ctx.strokeStyle = '#ffffff';

            const d = 8; 
            const rami = (mayN?1:0) + (mayS?1:0) + (mayE?1:0) + (mayW?1:0);
            const isCorner = rami === 2 && !((mayN && mayS) || (mayE && mayW));
            const isIntersection = rami >= 3;

            if (isCorner) {
                if (mayN && mayE) {
                    ctx.beginPath(); ctx.arc(128, 0, d, Math.PI / 2, Math.PI); ctx.stroke();
                    ctx.beginPath(); ctx.arc(128, 0, 128 - d, Math.PI / 2, Math.PI); ctx.stroke();
                } else if (mayN && mayW) {
                    ctx.beginPath(); ctx.arc(0, 0, d, 0, Math.PI / 2); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0, 0, 128 - d, 0, Math.PI / 2); ctx.stroke();
                } else if (mayS && mayE) {
                    ctx.beginPath(); ctx.arc(128, 128, d, Math.PI, 1.5 * Math.PI); ctx.stroke();
                    ctx.beginPath(); ctx.arc(128, 128, 128 - d, Math.PI, 1.5 * Math.PI); ctx.stroke();
                } else if (mayS && mayW) {
                    ctx.beginPath(); ctx.arc(0, 128, d, 1.5 * Math.PI, 2 * Math.PI); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0, 128, 128 - d, 1.5 * Math.PI, 2 * Math.PI); ctx.stroke();
                }
            } else if (isIntersection) {
                if (mayN && mayW) { ctx.beginPath(); ctx.arc(0, 0, d, 0, Math.PI / 2); ctx.stroke(); }
                else {
                    if (!mayW) { ctx.beginPath(); ctx.moveTo(d, 0); ctx.lineTo(d, d); ctx.stroke(); }
                    if (!mayN) { ctx.beginPath(); ctx.moveTo(0, d); ctx.lineTo(d, d); ctx.stroke(); }
                }
                if (mayN && mayE) { ctx.beginPath(); ctx.arc(128, 0, d, Math.PI / 2, Math.PI); ctx.stroke(); }
                else {
                    if (!mayE) { ctx.beginPath(); ctx.moveTo(128 - d, 0); ctx.lineTo(128 - d, d); ctx.stroke(); }
                    if (!mayN) { ctx.beginPath(); ctx.moveTo(128 - d, d); ctx.lineTo(128, d); ctx.stroke(); }
                }
                if (mayS && mayW) { ctx.beginPath(); ctx.arc(0, 128, d, 1.5 * Math.PI, 2 * Math.PI); ctx.stroke(); }
                else {
                    if (!mayW) { ctx.beginPath(); ctx.moveTo(d, 128 - d); ctx.lineTo(d, 128); ctx.stroke(); }
                    if (!mayS) { ctx.beginPath(); ctx.moveTo(0, 128 - d); ctx.lineTo(d, 128 - d); ctx.stroke(); }
                }
                if (mayS && mayE) { ctx.beginPath(); ctx.arc(128, 128, d, Math.PI, 1.5 * Math.PI); ctx.stroke(); }
                else {
                    if (!mayE) { ctx.beginPath(); ctx.moveTo(128 - d, 128 - d); ctx.lineTo(128 - d, 128); ctx.stroke(); }
                    if (!mayS) { ctx.beginPath(); ctx.moveTo(128 - d, 128 - d); ctx.lineTo(128, 128 - d); ctx.stroke(); }
                }
            } else {
                if (!mayW) { ctx.beginPath(); ctx.moveTo(d, 0); ctx.lineTo(d, 128); ctx.stroke(); }
                if (!mayE) { ctx.beginPath(); ctx.moveTo(128 - d, 0); ctx.lineTo(128 - d, 128); ctx.stroke(); }
                if (!mayN) { ctx.beginPath(); ctx.moveTo(0, d); ctx.lineTo(128, d); ctx.stroke(); }
                if (!mayS) { ctx.beginPath(); ctx.moveTo(0, 128 - d); ctx.lineTo(128, 128 - d); ctx.stroke(); }
            }

            // YELLOW LINES
            ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 2;
            const gitna = 64; const gap = 3;

            const drawDoubleCurve = (cx, cy, r, startAng, endAng) => {
                ctx.beginPath(); ctx.arc(cx, cy, r - gap, startAng, endAng, false); ctx.stroke();
                ctx.beginPath(); ctx.arc(cx, cy, r + gap, startAng, endAng, false); ctx.stroke();
            };

            const drawDoubleStraight = (x1, y1, x2, y2, isHoriz) => {
                ctx.beginPath();
                if (isHoriz) {
                    ctx.moveTo(x1, y1 - gap); ctx.lineTo(x2, y2 - gap);
                    ctx.moveTo(x1, y1 + gap); ctx.lineTo(x2, y2 + gap);
                } else {
                    ctx.moveTo(x1 - gap, y1); ctx.lineTo(x2 - gap, y2);
                    ctx.moveTo(x1 + gap, y1); ctx.lineTo(x2 + gap, y2);
                }
                ctx.stroke();
            };

            if (isCorner) {
                if (mayN && mayE) drawDoubleCurve(128, 0, gitna, Math.PI / 2, Math.PI);
                else if (mayN && mayW) drawDoubleCurve(0, 0, gitna, 0, Math.PI / 2);
                else if (mayS && mayE) drawDoubleCurve(128, 128, gitna, Math.PI, 1.5 * Math.PI);
                else if (mayS && mayW) drawDoubleCurve(0, 128, gitna, 1.5 * Math.PI, 2 * Math.PI);
            } else if (isIntersection) {
                const stopOffset = 36; 
                if (mayN) drawDoubleStraight(gitna, 0, gitna, gitna - stopOffset, false);
                if (mayS) drawDoubleStraight(gitna, gitna + stopOffset, gitna, 128, false);
                if (mayE) drawDoubleStraight(gitna + stopOffset, gitna, 128, gitna, true);
                if (mayW) drawDoubleStraight(0, gitna, gitna - stopOffset, gitna, true);
            } else {
                if (mayE || mayW) drawDoubleStraight(0, gitna, 128, gitna, true);
                else drawDoubleStraight(gitna, 0, gitna, 128, false);
            }

            return new THREE.CanvasTexture(canvas);
        }

        function gupitinAngLupaTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#6e4720'; ctx.fillRect(0, 0, 64, 64);
            ctx.fillStyle = '#543516';
            for (let i = 0; i < 30; i++) { ctx.fillRect(Math.random()*64, Math.random()*64, 3, 3); }
            return new THREE.CanvasTexture(canvas);
        }

        function iUpdateAngLahatNgKoneksyon() {
            Object.keys(lahatNgKalsadaMesh).forEach(key => {
                if (!nakalatagNaMgaDaan.has(key)) return;

                const [x, z] = key.split(',').map(Number);
                const mayN = nakalatagNaMgaDaan.has(`${x},${z - 3}`);
                const mayS = nakalatagNaMgaDaan.has(`${x},${z + 3}`);
                const mayE = nakalatagNaMgaDaan.has(`${x + 3},${z}`);
                const mayW = nakalatagNaMgaDaan.has(`${x - 3},${z}`);

                const bagongTexture = gupitinAngKalsadaTexture(mayN, mayS, mayE, mayW);
                const mesh = lahatNgKalsadaMesh[key];
                mesh.material.map = bagongTexture;
                mesh.material.needsUpdate = true;
            });
        }



        // --- D. WORKER & BUILD LOGIC ---

        function lumikhaNgManggagawa(x, z) {
            const workerGroup = new THREE.Group();
            const katawan = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.5, 0.3), new THREE.MeshStandardMaterial({ color: 0x0055ff }));
            katawan.position.y = 0.25; workerGroup.add(katawan);
            const ulo = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.25, 0.25), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
            ulo.position.y = 0.625; workerGroup.add(ulo);
            const helmet = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.12, 0.3), new THREE.MeshStandardMaterial({ color: 0xffaa00 }));
            helmet.position.y = 0.75; workerGroup.add(helmet);

            const toolPivot = new THREE.Group(); toolPivot.position.set(0.2, 0.4, 0.1);
            const handle = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.6, 0.05), new THREE.MeshStandardMaterial({ color: 0x8b5a2b }));
            handle.position.y = 0.1; handle.rotation.x = Math.PI / 4; toolPivot.add(handle);
            const bakal = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.06, 0.06), new THREE.MeshStandardMaterial({ color: 0x777777, metalness: 0.8 }));
            bakal.position.set(0, 0.35, 0.15); toolPivot.add(bakal);

            workerGroup.add(toolPivot); workerGroup.position.set(x, 0, z);
            workerGroup.userData = { toolPivot: toolPivot };
            return workerGroup;
        }

        function magplanoNgDaan(gridPos) {
            if (!gridPos) return;

            const posKey = `${gridPos.x},${gridPos.z}`;
            if (nakalatagNaMgaDaan.has(posKey) || nakaplanoPaLang.has(posKey)) return;
            
            if (kasalukuyangBatchId === 0) {
                kasalukuyangBatchId = Date.now();
                pendingBatches[kasalukuyangBatchId] = { tiles: [], uiElement: null, hulingTilePos: null };
            }

            nakaplanoPaLang.add(posKey);

            const geo = new THREE.BoxGeometry(3, 0.1, 3);
            const mat = new THREE.MeshStandardMaterial({ map: gupitinAngLupaTexture(), transparent: true, opacity: 0.6 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(gridPos.x, 0.05, gridPos.z);
            scene.add(mesh);

            lahatNgKalsadaMesh[posKey] = mesh;
            pendingBatches[kasalukuyangBatchId].tiles.push({ posKey: posKey, gridPos: gridPos, mesh: mesh });
            pendingBatches[kasalukuyangBatchId].hulingTilePos = gridPos;
        }

        function aprubahanAngBatch(batchId) {
            const batch = pendingBatches[batchId];
            if (!batch) return;

            // BAGO: Dahil na-click na ang check mark, itatago na ulit ang grid guide
            gridGuide.visible = false;

            batch.tiles.forEach(plano => {
                plano.mesh.material.opacity = 1.0;
                plano.mesh.material.map = gupitinAngLupaTexture();
                plano.mesh.material.needsUpdate = true;

                const pBarContainer = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 0.2), new THREE.MeshBasicMaterial({ color: 0x333333 }));
                pBarContainer.position.set(plano.gridPos.x, 1.5, plano.gridPos.z); scene.add(pBarContainer);

                const pBar = new THREE.Mesh(new THREE.BoxGeometry(2, 0.12, 0.22), new THREE.MeshBasicMaterial({ color: 0x00ffaa }));
                pBar.position.set(plano.gridPos.x, 1.51, plano.gridPos.z); scene.add(pBar);

                const workers = [];
                for (let i = 0; i < 2; i++) {
                    const side = (i === 0) ? -1.1 : 1.1;
                    const worker = lumikhaNgManggagawa(plano.gridPos.x + side, plano.gridPos.z + (Math.random() - 0.5));
                    worker.lookAt(plano.gridPos.x, 0, plano.gridPos.z);
                    scene.add(worker); workers.push(worker);
                }

                activeConstructions.push({
                    posKey: plano.posKey, mesh: plano.mesh, workers: workers,
                    progressBarContainer: pBarContainer, progressBarMesh: pBar, progress: 0, duration: 40.0 
                });
            });

            batch.uiElement.remove();
            delete pendingBatches[batchId];
            document.getElementById('progress-container').style.display = 'block';
            kasalukuyangBatchId = 0;
            document.getElementById('status-text').innerText = "Status: Ginagawa ang kalsada...";
        }

        function cancelahanAngBatch(batchId) {
            const batch = pendingBatches[batchId];
            if (!batch) return;

            // BAGO: Dahil kanselado ang pagguhit (na-click ang X), mawawala rin ang grid guide sa lupa
            gridGuide.visible = false;

            batch.tiles.forEach(plano => {
                scene.remove(plano.mesh);
                nakaplanoPaLang.delete(plano.posKey);
                delete lahatNgKalsadaMesh[plano.posKey];
            });

            batch.uiElement.remove();
            delete pendingBatches[batchId];
            kasalukuyangBatchId = 0;
            document.getElementById('status-text').innerText = "Status: Idle";
        }

        function simulanAngPagdaan() {
            kasalukuyangNagdadalan = true;
            
            // BAGO: Awtomatikong pinapakita ang grid kapag handa nang mag-drawing ang user
            gridGuide.visible = true; 
            
            document.getElementById('status-text').innerText = "Status: I-drag ang mouse sa mapa...";
        }


        
        // --- E. EVENT LISTENERS ---

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.classList.contains('btn-ui')) return; 
            if (kasalukuyangNagdadalan && e.button === 0) {
                isDragging = true;
                magplanoNgDaan(makuhaAngGridPosisyon(e));
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!kasalukuyangNagdadalan || !isDragging) return;
            magplanoNgDaan(makuhaAngGridPosisyon(e));
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                kasalukuyangNagdadalan = false;
                
                if (kasalukuyangBatchId && pendingBatches[kasalukuyangBatchId]) {
                    const batch = pendingBatches[kasalukuyangBatchId];
                    const uiDiv = document.createElement('div');
                    uiDiv.className = 'floating-ui';
                    uiDiv.innerHTML = `
                        <button class="btn-ui btn-check" onclick="aprubahanAngBatch('${kasalukuyangBatchId}')">✔️</button>
                        <button class="btn-ui btn-cancel" onclick="cancelahanAngBatch('${kasalukuyangBatchId}')">❌</button>
                    `;
                    document.getElementById('ui-container').appendChild(uiDiv);
                    batch.uiElement = uiDiv;
                }
            }
        });

        function makuhaAngGridPosisyon(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersect = raycaster.intersectObject(lupa);
            if (intersect.length > 0) {
                return { x: Math.round(intersect[0].point.x / 3) * 3, z: Math.round(intersect[0].point.z / 3) * 3 };
            }
            return null;
        }

        // --- F. ANIMATION LOOP ---
        let animationTime = 0;
        const tempV = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();
            animationTime += deltaTime * 8;

            Object.keys(pendingBatches).forEach(id => {
                const b = pendingBatches[id];
                if (b.hulingTilePos && b.uiElement) {
                    tempV.set(b.hulingTilePos.x, 0.5, b.hulingTilePos.z).project(camera);
                    b.uiElement.style.left = `${(tempV.x * .5 + .5) * window.innerWidth}px`;
                    b.uiElement.style.top = `${(tempV.y * -.5 + .5) * window.innerHeight}px`;
                }
            });

            let totalProgress = 0;
            for (let i = activeConstructions.length - 1; i >= 0; i--) {
                const item = activeConstructions[i];
                item.progress += deltaTime / item.duration;
                totalProgress += item.progress;

                if (item.progress < 1) {
                    item.workers.forEach((w, idx) => {
                        const wave = Math.sin(animationTime + idx * 2);
                        w.userData.toolPivot.rotation.x = wave > 0 ? wave * 0.8 : wave * 0.3;
                        w.rotation.x = wave > 0 ? wave * 0.15 : 0;
                    });
                    item.progressBarMesh.scale.x = item.progress;
                    item.progressBarMesh.position.x = item.mesh.position.x - (1 - item.progress) * 1.0;
                } else {
                    nakalatagNaMgaDaan.add(item.posKey);
                    nakaplanoPaLang.delete(item.posKey);

                    item.workers.forEach(w => scene.remove(w));
                    scene.remove(item.progressBarContainer); scene.remove(item.progressBarMesh);
                    activeConstructions.splice(i, 1);

                    iUpdateAngLahatNgKoneksyon();
                    document.getElementById('status-text').innerText = "Status: 🎉 Building Complete!";
                }
            }

            if (activeConstructions.length > 0) {
                const pct = Math.min(Math.floor((totalProgress / activeConstructions.length) * 100), 100);
                document.getElementById('progress-bar').style.width = pct + '%';
            } else {
                document.getElementById('progress-container').style.display = 'none';
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
